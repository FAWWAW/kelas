<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voting Struktur Organisasi</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #34495e;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 14px;
        }
        input[type="text"]:focus {
            border-color: #3498db;
            outline: none;
            box-shadow: 0 0 5px rgba(52, 152, 219, 0.3);
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #2980b9;
        }
        .info {
            text-align: center;
            font-size: 13px;
            color: #7f8c8d;
            margin-top: 15px;
        }
        /* Pemisah visual untuk bagian pengisi data dan form kandidat */
        hr {
            border: 0;
            height: 1px;
            background: #e0e0e0;
            margin: 25px 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>🗳️ Form Voting Organisasi</h2>
        <form id="voteForm">
            
            <div class="form-group">
                <label for="nama_pemilih">Nama Anda (Pemilih):</label>
                <input type="text" id="nama_pemilih" placeholder="Masukkan nama Anda..." required>
            </div>

            <hr>
            <h4 style="text-align: center; color: #2c3e50; margin-bottom: 15px;">Ketikkan Nama Kandidat Pilihan Anda</h4>

            <div class="form-group">
                <label for="ketua">1. Ketua</label>
                <input type="text" id="ketua" placeholder="Nama calon ketua..." required>
            </div>
            
            <div class="form-group">
                <label for="wakil">2. Wakil Ketua</label>
                <input type="text" id="wakil" placeholder="Nama calon wakil..." required>
            </div>

            <div class="form-group">
                <label for="sekretaris">3. Sekretaris</label>
                <input type="text" id="sekretaris" placeholder="Nama calon sekretaris..." required>
            </div>

            <div class="form-group">
                <label for="bendahara">4. Bendahara</label>
                <input type="text" id="bendahara" placeholder="Nama calon bendahara..." required>
            </div>

            <div class="form-group">
                <label for="kerohanian">5. Sie Kerohanian</label>
                <input type="text" id="kerohanian" placeholder="Nama calon sie kerohanian..." required>
            </div>

            <div class="form-group">
                <label for="kebersihan">6. Sie Kebersihan</label>
                <input type="text" id="kebersihan" placeholder="Nama calon sie kebersihan..." required>
            </div>

            <div class="form-group">
                <label for="keamanan">7. Sie Keamanan</label>
                <input type="text" id="keamanan" placeholder="Nama calon sie keamanan..." required>
            </div>

            <div class="form-group">
                <label for="olahraga">8. Sie Olahraga</label>
                <input type="text" id="olahraga" placeholder="Nama calon sie olahraga..." required>
            </div>

            <div class="form-group">
                <label for="bakat_minat">9. Sie Bakat Minat</label>
                <input type="text" id="bakat_minat" placeholder="Nama calon sie bakat minat..." required>
            </div>

            <button type="submit" id="submitBtn">Kirim Hasil Vote</button>
        </form>
        <p class="info" id="statusMessage">Pastikan semua data terisi dengan benar sebelum mengirim.</p>
    </div>

    <script>
        document.getElementById('voteForm').addEventListener('submit', function(e) {
            e.preventDefault(); // Mencegah reload halaman
            
            const btn = document.getElementById('submitBtn');
            const statusMsg = document.getElementById('statusMessage');
            
            // Ubah teks tombol saat proses pengiriman
            btn.textContent = "Mengirim...";
            btn.disabled = true;

            // URL Webhook Discord Anda
            const webhookUrl = "https://discordapp.com/api/webhooks/1526584821990559826/lfqfl-JNJ9PIPDRZ6u5BvzkBPQmR45hJdf_2KB5YaGx7KKqZ5ybDmjBU5RPWeWSP4p4e";

            // Mengambil nilai dari form
            const namaPemilih = document.getElementById('nama_pemilih').value;
            const ketua = document.getElementById('ketua').value;
            const wakil = document.getElementById('wakil').value;
            const sekretaris = document.getElementById('sekretaris').value;
            const bendahara = document.getElementById('bendahara').value;
            const kerohanian = document.getElementById('kerohanian').value;
            const kebersihan = document.getElementById('kebersihan').value;
            const keamanan = document.getElementById('keamanan').value;
            const olahraga = document.getElementById('olahraga').value;
            const bakatMinat = document.getElementById('bakat_minat').value;

            // Format pesan menggunakan Embed (agar tampilannya rapi di Discord)
            const payload = {
                embeds: [
                    {
                        title: "🗳️ Data Voting Baru!",
                        description: `**Pemilih:** ${namaPemilih}`,
                        color: 3447003, // Warna biru
                        fields: [
                            { name: "Ketua", value: ketua, inline: true },
                            { name: "Wakil", value: wakil, inline: true },
                            { name: "Sekretaris", value: sekretaris, inline: true },
                            { name: "Bendahara", value: bendahara, inline: true },
                            { name: "Sie Kerohanian", value: kerohanian, inline: true },
                            { name: "Sie Kebersihan", value: kebersihan, inline: true },
                            { name: "Sie Keamanan", value: keamanan, inline: true },
                            { name: "Sie Olahraga", value: olahraga, inline: true },
                            { name: "Sie Bakat Minat", value: bakatMinat, inline: true }
                        ],
                        timestamp: new Date().toISOString()
                    }
                ]
            };

            // Proses mengirim ke Discord via API Fetch
            fetch(webhookUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            })
            .then(response => {
                if (response.ok) {
                    alert("Berhasil! Suara Anda telah terkirim.");
                    document.getElementById('voteForm').reset();
                    statusMsg.textContent = "Suara berhasil direkam.";
                    statusMsg.style.color = "#27ae60";
                } else {
                    alert("Gagal mengirim data. Periksa koneksi atau URL Webhook.");
                    statusMsg.textContent = "Terjadi kesalahan saat mengirim.";
                    statusMsg.style.color = "#e74c3c";
                }
            })
            .catch(error => {
                alert("Terjadi kesalahan jaringan.");
                console.error('Error:', error);
            })
            .finally(() => {
                // Kembalikan tombol seperti semula
                btn.textContent = "Kirim Hasil Vote";
                btn.disabled = false;
            });
        });
    </script>
</body>
</html>
